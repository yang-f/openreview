name: 'OpenCode Review'
description: 'OpenCode Review'
inputs:
  who-to-greet:  # id of input
    description: 'Who to greet'
    required: true
    default: 'World'
outputs:
  random-number:
    description: "Random number"
    value: ${{ steps.random-number-generator.outputs.random-number }}
runs:
  using: "composite"
  steps:
    - name: Get opencode version
      id: version
      shell: bash
      run: |
        VERSION=$(curl -sf https://api.github.com/repos/anomalyco/opencode/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
        echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

    - name: Cache opencode
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.opencode/bin
        key: opencode-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

    - name: Install opencode
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: curl -fsSL https://opencode.ai/install | bash

    - name: Add opencode to PATH
      shell: bash
      run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

    - name: Generate diff
      shell: bash
      run: |
        git fetch origin ${{ github.event.pull_request.base.ref }}
        git fetch origin ${{ github.event.pull_request.base.sha }}

        # use unified diff to make it easier to parse
        TARGET=${{ github.event.pull_request.base.ref }}
        git diff origin/$TARGET --unified=0 > pr.diff

        cat pr.diff

    - name: Code review
      shell: bash
      id: opencode
      run: |
        opencode run -m 'opencode/minimax-m2.5-free' "$(cat <<EOF
        You are an expert code reviewer.

        Focus on:
        - Bugs
        - Concurrency issues
        - Edge cases
        - Performance
        - Code quality

        Output format (STRICT JSON):
        {
          "summary": "<overall review summary, 1-3 sentences, or empty string if no major concerns>",
          "comments": [
            {
              "file": "<file_path>",
              "start_line": <start_line_in_file>
              "end_line": <end_line_in_file>,
              "severity": "nit|minor|major|critical",
              "comment": "<single line comment>"
            }
          ]
        }

        Constraints:
        - Output MUST be valid JSON
        - Do NOT include markdown, explanations, or code fences
        - "comments" must be an array (use [] if no issues)
        - "summary" must be a string (use "LGTM" if no summary)
        - Each "comment" must be a single line (no newline characters)
        - ONLY comment on added lines (lines starting with '+')
        - "start_line"/"end_line" must be actually lines in the pr.diff
        - Each "comment" must contain "start_line" and "end_line"
        - Must use chinese comments

        The diff contents in pr.diff.
        EOF
        )" > review.json

        cat review.json

    - name: Comments
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          function safeRead(path) {
            if (!fs.existsSync(path)) {
              throw new Error(`\`${path}\` not found`);
            }
            return fs.readFileSync(path, "utf8");
          }

          function safeParseJSON(text) {
            try {
              return JSON.parse(text);
            } catch (err) {
              console.log("⚠️ JSON parse failed, trying to auto-fix common escape issues...");
              const fixed = text.replace(/\\(?!["\\/bfnrtu])/g, '\\\\');

              try {
                return JSON.parse(fixed);
              } catch (e) {
                console.error("❌ review.json is invalid JSON");
                console.error("Original error:", err.message);
                console.error("Content preview:", text.slice(0, 500));
                throw e;
              }
            }
          }

          const review = safeRead('review.json');
          const data = safeParseJSON(review);

          const diff = safeRead('pr.diff');
          const lines = diff.split('\n');

          const prNumber = context.payload.pull_request.number;
          const repo = context.repo.repo;
          const owner = context.repo.owner;

          function mapdiff(target) {
            let oldLine = 0;
            let newLine = 0;
            let linNo = 0;

            for (const line of lines) {
              linNo++;

              if (line.startsWith('+++ b/')) {
                oldLine = 0;
                newLine = 0;
                continue;
              }

              if (line.startsWith('@@')) {
                const m = line.match(/-(\d+)(?:,\d+)? \+(\d+)(?:,\d+)?/);
                if (m) {
                  oldLine = parseInt(m[1]);
                  newLine = parseInt(m[2]);
                }
                continue;
              }

              // target is 1-based
              if (linNo === target) {
                if (line.startsWith('+') && !line.startsWith('+++')) {
                  return { side: 'RIGHT', line: newLine, type: 'add' };
                } else if (line.startsWith('-') && !line.startsWith('---')) {
                  return { side: 'LEFT', line: oldLine, type: 'delete' };
                } else if (!line.startsWith('\\')) {
                  return { side: 'RIGHT', line: newLine, type: 'context' };
                } else {
                  return null;
                }
              }

              if (line.startsWith('+') && !line.startsWith('+++')) {
                newLine++;
              } else if (line.startsWith('-') && !line.startsWith('---')) {
                oldLine++;
              } else if (!line.startsWith('\\')) {
                oldLine++;
                newLine++;
              }
            }

            return null;
          }

          // --- Post inline comments ---
          const comments = data.comments || [];
          if (comments.length === 0) {
            console.log("No inline comments to post.");
          } else {
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            const sha = pr.head.sha;
            console.log("Latest commit SHA:", sha);

            for (const c of comments) {
              const start = mapdiff(c.start_line);
              const end = mapdiff(c.end_line);

              if (!end) {
                console.log(`⚠️ Skip: cannot map ${c.file} diff line ${c.end_line}`);
                continue;
              }

              const startLine = start ? start.line : end.line;
              const side = start ? start.side : end.side;

              console.log(
                `Posting inline comment to ${c.file} (${startLine}-${end.line})`,
                c.comment
              );

              await github.rest.pulls.createReviewComment({
                owner,
                repo,
                pull_number: prNumber,
                commit_id: sha,
                path: c.file,
                start_line: startLine,
                start_side: side,
                line: end.line,
                side: side,
                body: `[${c.severity}] ${c.comment}`,
              });
            }
          }

          // Ignore post review summary, because it's too noisy.
          if (data.summary) {
            console.log("Review summary: " + data.summary);
          }

          // --- Auto approve if no comments ---
          if (comments.length === 0) {
            console.log("No summary and no comments: approving PR automatically.");
            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number: prNumber,
              event: "APPROVE",
              body: "Auto-approved by Review Bot (no issues found)."
            });
          }

    - name: Cleanup
      shell: bash
      run: |
        rm -rf pr.diff
        rm -rf review.json


